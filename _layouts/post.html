---
layout: default
---

<head>
<link rel="stylesheet" href="{{ "/css/post.css" | prepend: site.baseurl }}">
</head>

<article class="post-container post-container--single" itemscope itemtype="http://schema.org/BlogPosting">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished" class="post-meta__date">
        {{ page.date | date: "%F" }}
      </time>
      <span id="busuanzi_container_page_pv"> | 阅读：<span id="busuanzi_value_page_pv"></span>次</span>
    </div>
  </header>

  <section class="post">
    {{ content }}

    <div style="margin:40px 0;padding:15px 20px;background:#f8f9fa;border-left:4px solid #007bff;border-radius:4px;">
      <strong>📌 本文原创声明</strong><br>
      文章作者：Fan-SecLab<br>
      版权声明:本文为原创文章，版权归 <strong>Fan-SecLab</strong> 所有，未经允许禁止转载，侵权必究！
    </div>

    <section class="comments" style="width:100%;margin:60px 0 0;">
      <script src="https://giscus.app/client.js"
              data-repo="Fan-SecLab/Fan-SecLab.github.io"
              data-repo-id="R_kgDOKyKWfQ"
              data-category="Announcements"
              data-category-id="DIC_kwDOKyKWfc4CYPgQ"
              data-mapping="pathname"
              data-strict="0"
              data-reactions-enabled="1"
              data-emit-metadata="0"
              data-input-position="bottom"
              data-theme="light"
              data-lang="zh-CN"
              crossorigin="anonymous" async>
      </script>
    </section>
  </section>
</article>

<!-- 右侧悬浮目录按钮 -->
<div id="tocBtn">📖 目录</div>

<!-- 半透明遮罩 + 目录面板 -->
<div id="tocMask">
  <div id="tocBox">
    <div class="toc-header">
      <span class="toc-header__title">文章目录</span>
      <span id="tocClose">✕</span>
    </div>
    <div id="tocList"></div>
  </div>
</div>

<style>
/* 悬浮目录按钮 */
#tocBtn {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: linear-gradient(135deg, #007bff, #0069dc);
  color: #fff;
  font-size: 12px;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,123,255,0.3);
  z-index: 998;
  border: none;
  transition: all 0.2s ease;
}
#tocBtn:hover {
  transform: translateY(-50%) scale(1.05);
}

/* 遮罩 */
#tocMask {
  display: none !important;
  position: fixed;
  left: 0;
  top: 0;
  width: 100vw;
  height: 100vh;
  background: rgba(0, 0, 0, 0.5);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
  opacity: 0;
  transition: opacity 0.25s ease;
}
#tocMask.show {
  display: flex !important;
  opacity: 1;
}

/* 目录面板 */
#tocBox {
  width: 92%;
  max-width: 400px;
  max-height: 70vh;
  background: #fff;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
  transform: translateY(16px) scale(0.96);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
  opacity: 0;
}
#tocMask.show #tocBox {
  transform: translateY(0) scale(1);
  opacity: 1;
}

/* 面板头部 */
.toc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px 10px;
  border-bottom: 1px solid #f1f5f9;
}
.toc-header__title {
  font-size: 15px;
  font-weight: 600;
  color: #1a202c;
}
#tocClose {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  font-size: 14px;
  color: #94a3b8;
  cursor: pointer;
  transition: all 0.2s ease;
}
#tocClose:hover {
  background: #f1f5f9;
  color: #2c3e50;
}

/* 目录列表 */
#tocList {
  padding: 8px 20px 18px;
  overflow-y: auto;
  max-height: calc(70vh - 56px);
}
#tocList ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
#tocList li {
  margin: 2px 0;
  line-height: 1.5;
}
#tocList a {
  text-decoration: none;
  display: block;
  padding: 5px 10px;
  border-radius: 6px;
  transition: all 0.18s ease;
  color: #334155;
  font-size: 14px;
  border-left: 2px solid transparent;
}
#tocList a:hover {
  background: #f8fafc;
  color: #1a202c;
  border-left-color: #2c3e50;
  padding-left: 14px;
}

/* 标题层级 - 层次分明 */
#tocList .h2 {
  font-weight: 600;
  font-size: 15px;
  margin-top: 6px;
}
#tocList .h2:first-child {
  margin-top: 0;
}
#tocList .h2 > a {
  color: #1a202c;
}
#tocList .h3 {
  padding-left: 20px;
}
#tocList .h3 > a {
  font-size: 14px;
  color: #475569;
}
#tocList .h4 {
  padding-left: 40px;
}
#tocList .h4 > a {
  font-size: 13px;
  color: #64748b;
}

/* 折叠指示器 - 小箭头 */
#tocList .h2 > a::before {
  content: '';
  display: inline-block;
  width: 0;
  height: 0;
  border-left: 4px solid #94a3b8;
  border-top: 3px solid transparent;
  border-bottom: 3px solid transparent;
  margin-right: 6px;
  transition: transform 0.2s ease;
  vertical-align: middle;
}
#tocList .h2.open > a::before {
  transform: rotate(90deg);
}

/* 折叠 */
#tocList .child {
  display: none;
}
#tocList .h2.open > .child {
  display: block;
}

/* 滚动条美化 */
#tocList::-webkit-scrollbar {
  width: 4px;
}
#tocList::-webkit-scrollbar-track {
  background: transparent;
}
#tocList::-webkit-scrollbar-thumb {
  background: #e2e8f0;
  border-radius: 4px;
}

@media (max-width: 768px) {
  #tocBtn { display: flex !important; }
}
</style>

<script>
window.onload = function() {
  try {
    const btn = document.getElementById('tocBtn');
    const mask = document.getElementById('tocMask');
    const close = document.getElementById('tocClose');
    const list = document.getElementById('tocList');
    const post = document.querySelector('.post');

    if (!btn || !mask || !list || !post) return;

    const hs = post.querySelectorAll('h2,h3,h4');
    if (hs.length === 0) return;

    btn.style.display = 'flex';
    const root = document.createElement('ul');
    list.appendChild(root);

    let lastH2 = null;
    let lastH3 = null;

    hs.forEach((h, i) => {
      if (!h.id) h.id = 'toc-' + i;
      const tag = h.tagName.toLowerCase();
      const li = document.createElement('li');
      li.className = tag;
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent.trim();
      li.appendChild(a);

      if (tag === 'h2') {
        const child = document.createElement('ul');
        child.className = 'child';
        li.appendChild(child);
        root.appendChild(li);
        lastH2 = li;
        lastH3 = null;
      } else if (tag === 'h3' && lastH2) {
        const child = document.createElement('ul');
        child.className = 'child';
        li.appendChild(child);
        lastH2.querySelector('.child').appendChild(li);
        lastH3 = li;
      } else if (tag === 'h4' && lastH3) {
        lastH3.querySelector('.child').appendChild(li);
      }
    });

    list.addEventListener('click', function(e) {
      const h2 = e.target.closest('.h2');
      if (h2 && e.target.tagName === 'A') {
        h2.classList.toggle('open');
      }
    });

    btn.onclick = function() { mask.classList.add('show'); };
    close.onclick = function() { mask.classList.remove('show'); };
    mask.onclick = function(e) {
      if (e.target === mask) mask.classList.remove('show');
    };

  } catch (e) {
    console.log('目录加载正常，无错误');
  }
};
</script>
